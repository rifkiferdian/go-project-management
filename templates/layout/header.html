{{ define "header" }}
<header class="sticky top-0 z-30 border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="relative flex flex-wrap items-center justify-between gap-3 px-4 py-3 lg:px-8">
        <div class="flex min-w-0 items-center gap-3">
            <button type="button" class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 text-slate-600 transition hover:bg-slate-50 lg:hidden" data-sidebar-toggle aria-label="Open sidebar">
                <i class="bx bx-menu text-xl"></i>
            </button>

            <div class="flex min-w-0 flex-col leading-tight">
                <span class="text-[10px] font-semibold uppercase tracking-[0.35em] text-slate-400">Go PM</span>
                <span class="truncate text-sm font-semibold text-slate-800">
                    {{ if .Title }}{{ .Title }}{{ else }}Project Management{{ end }}
                </span>
            </div>
        </div>

        <div class="flex items-center gap-2 sm:gap-4 lg:mr-10">
            <span class="hidden h-8 w-px bg-slate-200 sm:inline-flex"></span>

            <details class="relative">
                <summary class="list-none cursor-pointer">
                    <div class="inline-flex items-center gap-2 sm:gap-3 text-slate-600">
                        <div class="hidden text-right sm:block sm:text-left">
                            <div class="text-[13px] font-semibold text-slate-800">{{ if .User }}{{ index .User "name" }}{{ end }}</div>
                            <div class="text-[11px] text-slate-400">{{ if .User }}{{ index .User "role" }}{{ else }}Member{{ end }}</div>
                        </div>
                        <div class="inline-flex h-9 w-9 items-center justify-center rounded-full bg-brand-auth-500 text-sm font-semibold text-white sm:h-10 sm:w-10" style="background-color: #f97316;">
                            {{ if .Initials }}{{ .Initials }}{{ end }}
                        </div>
                    </div>
                </summary>
                <div class="absolute right-0 mt-3 w-[min(92vw,12rem)] rounded-2xl border border-slate-200 bg-white p-2 text-sm shadow-lg">
                    <a class="flex items-center gap-2 rounded-xl px-3 py-2 text-rose-600 transition hover:bg-rose-50" href="/logout">
                        <i class="bx bx-power-off text-base"></i>
                        <span>Logout</span>
                    </a>
                </div>
            </details>
        </div>
    </div>
</header>
{{ end }}
