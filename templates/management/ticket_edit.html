<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{{ .Title }}</title>

        <link rel="stylesheet" href="/assets/fonts/google/plus-jakarta-sans.css">
        <link rel="stylesheet" href="/assets/css/tailwind.css">
        <link href="/assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet" />
    </head>
    <body class="bg-slate-100 font-display text-slate-900">
        <div class="flex min-h-screen">
            {{ template "sidebar" . }}
            <div class="flex min-h-screen min-w-0 flex-1 flex-col">
                {{ template "header" . }}
                <main class="flex-1 px-4 py-6 lg:px-8">
                    <div class="mx-auto w-full max-w-4xl space-y-5">
                        <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                            <div>
                                <p class="text-xs font-semibold uppercase tracking-[0.25em] text-slate-400">Management / Tickets</p>
                                <h1 class="mt-1 text-2xl font-semibold text-slate-900">Edit Ticket</h1>
                            </div>
                            <div>
                                <a href="/tickets/{{ .Form.ID }}" class="inline-flex items-center gap-2 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-50">
                                    <i class="bx bx-arrow-back text-base"></i>
                                    Kembali
                                </a>
                            </div>
                        </div>

                        <form method="post" action="/tickets/update" class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm sm:p-6">
                            <input type="hidden" name="ticket_id" value="{{ .Form.ID }}">

                            {{ if .Error }}
                            <div class="mb-5 rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-600">
                                {{ .Error }}
                            </div>
                            {{ end }}

                            <div class="grid gap-4 sm:grid-cols-2">
                                <div>
                                    <label class="text-sm font-medium text-slate-700">Code</label>
                                    <input type="text" value="{{ .Form.Code }}" class="mt-1.5 w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-500 outline-none" readonly>
                                </div>
                                <div>
                                    <label class="text-sm font-medium text-slate-700">Project</label>
                                    <input type="text" value="{{ .Form.ProjectName }}" class="mt-1.5 w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-500 outline-none" readonly>
                                </div>
                                <div class="sm:col-span-2">
                                    <label for="name" class="text-sm font-medium text-slate-700">Nama ticket</label>
                                    <input id="name" name="name" type="text" value="{{ .Form.Name }}" class="mt-1.5 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none transition focus:border-[#f26419] focus:ring-2 focus:ring-[#f26419]/10" required>
                                </div>
                                <div class="sm:col-span-2">
                                    <label for="content" class="text-sm font-medium text-slate-700">Deskripsi</label>
                                    <textarea id="content" name="content" rows="6" class="mt-1.5 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm leading-6 outline-none transition focus:border-[#f26419] focus:ring-2 focus:ring-[#f26419]/10">{{ .Form.Content }}</textarea>
                                </div>
                                <div>
                                    <label for="status_id" class="text-sm font-medium text-slate-700">Status</label>
                                    <select id="status_id" name="status_id" class="mt-1.5 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none transition focus:border-[#f26419] focus:ring-2 focus:ring-[#f26419]/10" required>
                                        <option value="">Pilih status</option>
                                        {{ range .StatusOptions }}
                                        <option value="{{ .ID }}" {{ if eq $.Form.StatusID .ID }}selected{{ end }}>{{ .Name }}</option>
                                        {{ end }}
                                    </select>
                                </div>
                                <div>
                                    <label for="priority_id" class="text-sm font-medium text-slate-700">Priority</label>
                                    <select id="priority_id" name="priority_id" class="mt-1.5 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none transition focus:border-[#f26419] focus:ring-2 focus:ring-[#f26419]/10" required>
                                        <option value="">Pilih priority</option>
                                        {{ range .PriorityOptions }}
                                        <option value="{{ .ID }}" {{ if eq $.Form.PriorityID .ID }}selected{{ end }}>{{ .Name }}</option>
                                        {{ end }}
                                    </select>
                                </div>
                                <div>
                                    <label for="type_id" class="text-sm font-medium text-slate-700">Type</label>
                                    <select id="type_id" name="type_id" class="mt-1.5 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none transition focus:border-[#f26419] focus:ring-2 focus:ring-[#f26419]/10" required>
                                        <option value="">Pilih type</option>
                                        {{ range .TypeOptions }}
                                        <option value="{{ .ID }}" {{ if eq $.Form.TypeID .ID }}selected{{ end }}>{{ .Name }}</option>
                                        {{ end }}
                                    </select>
                                </div>
                                <div>
                                    <label for="owner_id" class="text-sm font-medium text-slate-700">Owner</label>
                                    <select id="owner_id" name="owner_id" class="mt-1.5 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none transition focus:border-[#f26419] focus:ring-2 focus:ring-[#f26419]/10" required>
                                        <option value="">Pilih owner</option>
                                        {{ range .UserOptions }}
                                        <option value="{{ .ID }}" {{ if eq $.Form.OwnerID .ID }}selected{{ end }}>{{ .Name }}</option>
                                        {{ end }}
                                    </select>
                                </div>
                                <div>
                                    <label for="responsible_id" class="text-sm font-medium text-slate-700">Responsible</label>
                                    <select id="responsible_id" name="responsible_id" class="mt-1.5 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none transition focus:border-[#f26419] focus:ring-2 focus:ring-[#f26419]/10">
                                        <option value="">Belum ada</option>
                                        {{ range .UserOptions }}
                                        <option value="{{ .ID }}" {{ if eq $.Form.ResponsibleID .ID }}selected{{ end }}>{{ .Name }}</option>
                                        {{ end }}
                                    </select>
                                </div>
                                <div>
                                    <label for="epic_id" class="text-sm font-medium text-slate-700">Epic</label>
                                    <select id="epic_id" name="epic_id" class="mt-1.5 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none transition focus:border-[#f26419] focus:ring-2 focus:ring-[#f26419]/10">
                                        <option value="">Tanpa epic</option>
                                        {{ range .EpicOptions }}
                                        <option value="{{ .ID }}" {{ if eq $.Form.EpicID .ID }}selected{{ end }}>{{ .Name }}</option>
                                        {{ end }}
                                    </select>
                                </div>
                                <div>
                                    <label for="estimation" class="text-sm font-medium text-slate-700">Estimasi jam</label>
                                    <input id="estimation" name="estimation" type="number" min="0" step="0.25" value="{{ .Form.Estimation }}" class="mt-1.5 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none transition focus:border-[#f26419] focus:ring-2 focus:ring-[#f26419]/10" placeholder="8">
                                </div>
                                <div>
                                    <label for="starts_at" class="text-sm font-medium text-slate-700">Start date</label>
                                    <input id="starts_at" name="starts_at" type="date" value="{{ .Form.StartsAt }}" class="mt-1.5 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none transition focus:border-[#f26419] focus:ring-2 focus:ring-[#f26419]/10">
                                </div>
                                <div>
                                    <label for="ends_at" class="text-sm font-medium text-slate-700">End date</label>
                                    <input id="ends_at" name="ends_at" type="date" value="{{ .Form.EndsAt }}" class="mt-1.5 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none transition focus:border-[#f26419] focus:ring-2 focus:ring-[#f26419]/10">
                                </div>
                            </div>

                            <div class="mt-5 flex flex-col gap-3 border-t border-slate-100 pt-5 sm:flex-row sm:justify-end">
                                <a href="/tickets/{{ .Form.ID }}" class="rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-50">Batal</a>
                                <button type="submit" class="inline-flex items-center justify-center gap-2 rounded-lg bg-[#f26419] px-4 py-2 text-sm font-medium text-white transition hover:bg-[#dc5a15]">
                                    <i class="bx bx-save text-base"></i>
                                    Simpan
                                </button>
                            </div>
                        </form>
                    </div>
                </main>
                {{ template "footer" . }}
            </div>
        </div>
        <div id="sidebar-overlay" class="fixed inset-0 z-40 hidden bg-slate-900/50 lg:hidden"></div>
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                var sidebar = document.getElementById('app-sidebar');
                var overlay = document.getElementById('sidebar-overlay');
                var toggleButtons = document.querySelectorAll('[data-sidebar-toggle]');

                function closeSidebar() {
                    if (!sidebar) return;
                    sidebar.classList.add('-translate-x-full');
                    if (overlay) overlay.classList.add('hidden');
                    document.body.classList.remove('overflow-hidden');
                }

                function openSidebar() {
                    if (!sidebar) return;
                    sidebar.classList.remove('-translate-x-full');
                    if (overlay) overlay.classList.remove('hidden');
                    document.body.classList.add('overflow-hidden');
                }

                toggleButtons.forEach(function (button) {
                    button.addEventListener('click', function () {
                        if (!sidebar) return;
                        if (sidebar.classList.contains('-translate-x-full')) {
                            openSidebar();
                        } else {
                            closeSidebar();
                        }
                    });
                });

                if (overlay) overlay.addEventListener('click', closeSidebar);
            });
        </script>
    </body>
</html>
